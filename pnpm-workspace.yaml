shellEmulator: true

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 10080
trustPolicyExclude:
  - xlsx@0.20.3

pmOnFail: warn

packages:
  - apps/*
  - packages/*

overrides:
  axios: ^1.17.0

patchedDependencies:
  '@ts-rest/core': patches/@ts-rest__core.patch

allowBuilds:
  '@parcel/watcher': false
  core-js: false
  esbuild: true
  json-editor-vue: false
  msgpackr-extract: false
  puppeteer: true
  sharp: true
  simple-git-hooks: true
  vue-demi: false
